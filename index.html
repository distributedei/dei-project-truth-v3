    .badge{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;font-family:'Barlow Condensed',sans-serif;}.b-dra{background:#f0f4f8;color:#8a9baa;border:1px solid #e2e8f0;}.b-sub{background:rgba(55,86,115,0.08);color:#375673;border:1px solid rgba(55,86,115,0.2);}.b-rev{background:rgba(100,60,180,0.3);color:#b89af0;border:1px solid rgba(150,100,230,0.3);}.b-app{background:rgba(46,204,138,0.15);color:var(--green);border:1px solid rgba(46,204,138,0.3);}.b-rej{background:rgba(224,82,82,0.15);color:var(--red);border:1px solid rgba(224,82,82,0.3);}.b-clo{background:#f0f4f8;color:#8a9baa;border:1px solid #e2e8f0;}.b-ret{background:rgba(232,169,48,0.15);color:var(--amber);border:1px solid rgba(232,169,48,0.3);}

    .mo{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}.ml{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:28px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,0.2);}

    .section-head{margin-bottom:20px;}.section-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;letter-spacing:0.5px;line-height:1;color:#375673;}.section-title span{color:#779d36;}.section-sub{font-size:14px;color:#8a9baa;margin-top:6px;}
    .loading{display:flex;align-items:center;justify-content:center;padding:60px;flex-direction:column;gap:16px;color:var(--gray);}.spinner{width:32px;height:32px;border:3px solid #e2e8f0;border-top-color:#779d36;border-radius:50%;animation:spin 0.8s linear infinite;}@keyframes spin{to{transform:rotate(360deg);}}

    .cs{background:#fff;border:1px dashed rgba(119,157,54,0.3);border-radius:10px;padding:48px;text-align:center;}
    .login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f5f7fa;}.login-card{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:48px 40px;text-align:center;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.08);}.login-wordmark{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;letter-spacing:1px;color:#375673;}.login-wordmark span{color:#779d36;}.login-tagline{font-size:11px;color:#8a9baa;text-transform:uppercase;letter-spacing:2px;margin-top:6px;}.login-divider{height:1px;background:linear-gradient(90deg,transparent,#779d36,transparent);margin:24px 0;}.ms-btn{background:#0078d4;border:none;color:#fff;padding:13px 28px;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif;display:flex;align-items:center;gap:10px;margin:0 auto;}.ms-btn:hover{background:#106ebe;}

    .bulk-bar{background:linear-gradient(135deg,#375673,#2d4a63);border-radius:10px;padding:14px 20px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:12px;color:#fff;animation:slideDown 0.2s ease-out;}

<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useCallback,useMemo,useRef}=React;
const CONFIG={clientId:"613928f8-0497-47ea-bb0f-c1725a1f156a",tenantId:"ec357a32-5b85-438d-a765-ae33c8eb13b7",siteId:"8103997e-0688-4832-a5b4-bf18de7f96f5",siteUrl:"https://distributedei.sharepoint.com",lists:{rfi:"38fd99d2-dad5-41d8-a898-4f5e425ad340"}};
const msalInstance=new msal.PublicClientApplication({auth:{clientId:CONFIG.clientId,authority:"https://login.microsoftonline.com/"+CONFIG.tenantId,redirectUri:window.location.origin},cache:{cacheLocation:"sessionStorage"}});
const SCOPES=["Sites.Selected","Files.Read.All","User.Read"];
async function getToken(){const a=msalInstance.getAllAccounts();if(!a.length)throw new Error("Not signed in");try{return(await msalInstance.acquireTokenSilent({scopes:SCOPES,account:a[0]})).accessToken;}catch(e){return(await msalInstance.acquireTokenPopup({scopes:SCOPES})).accessToken;}}
async function graph(m,p,b){const t=await getToken();const r=await fetch("https://graph.microsoft.com/v1.0"+p,{method:m||"GET",headers:{Authorization:"Bearer "+t,...(b?{"Content-Type":"application/json"}:{})},body:b?JSON.stringify(b):undefined});if(!r.ok){const e=await r.json();throw new Error(e.error?.message||"Error "+r.status);}return r.status===204?null:r.json();}
const SITE="/sites/"+CONFIG.siteId;
const S2A={BallinCourt:"BallInCourt",Assignedto:"AssignedTo"};const A2S={BallInCourt:"BallinCourt",AssignedTo:"Assignedto"};
function fromSP(f){const o={};for(const[k,v] of Object.entries(f))o[S2A[k]||k]=v;return o;}
function toSP(f){const o={};for(const[k,v] of Object.entries(f)){if(v!==""&&v!=null)o[A2S[k]||k]=v;}return o;}
async function getItems(l){const d=await graph("GET",SITE+"/lists/"+l+"/items?expand=fields&$top=999");return(d.value||[]).map(i=>({id:i.id,...fromSP(i.fields)}));}
async function addItem(l,f){return graph("POST",SITE+"/lists/"+l+"/items",{fields:toSP(f)});}
async function editItem(l,id,f){return graph("PATCH",SITE+"/lists/"+l+"/items/"+id+"/fields",toSP(f));}

const STS=["Draft","Submitted","In Review","Returned - Revise","Approved","Rejected","Closed"];
const BICS=["Engineering","Construction","PM","Owner","Vendor","AHJ","Utility"];
const SM={"Draft":"b-dra","Submitted":"b-sub","In Review":"b-rev","Returned - Revise":"b-ret","Approved":"b-app","Rejected":"b-rej","Closed":"b-clo"};
const BM={Engineering:"bc-e",Construction:"bc-c",PM:"bc-p",Owner:"bc-o",Vendor:"bc-v",AHJ:"bc-a",Utility:"bc-a"};
const BI={Engineering:"\u2699",Construction:"\uD83C\uDFD7",PM:"\uD83D\uDCCB",Owner:"\uD83D\uDC64",Vendor:"\uD83D\uDCE6",AHJ:"\uD83C\uDFDB",Utility:"\uD83C\uDFDB"};

function Badge({status}){return React.createElement("span",{className:"badge "+(SM[status]||"b-dra")},status||"\u2014");}
function BIC({val}){return React.createElement("span",{className:"bic "+(BM[val]||"bc-v")},(BI[val]||"\u2022")+" "+(val||"\u2014"));}
function agingDays(d){if(!d)return null;return Math.floor((new Date()-new Date(d))/86400000);}
function isOverdue(i){if(["Closed","Approved"].includes(i.Status))return false;var d=agingDays(i.DueDate);return d!==null&&d>0;}
function Aging({date,status}){if(["Closed","Approved"].includes(status))return React.createElement("span",{style:{color:"var(--green)",fontSize:12}},"\u25CF Done");var d=agingDays(date);if(d===null)return React.createElement("span",{style:{color:"#8a9baa"}},"\u2014");if(d<=0)return React.createElement("span",{style:{color:"var(--green)",fontSize:12}},"\u25CF On Track");if(d<7)return React.createElement("span",{style:{color:"var(--amber)",fontSize:12}},"\u25B2 "+d+"d");return React.createElement("span",{style:{color:"var(--red)",fontSize:12,fontWeight:700}},"\u26A0 "+d+"d");}
function fmtDate(d){if(!d)return"\u2014";return new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}

function Modal({title,onClose,children}){

}

      <div className="fg"><label className="fl">Ball in Court</label><select className="fs" value={f.BallInCourt} onChange={function(e){s("BallInCourt",e.target.value);}}>{BICS.map(function(v){return <option key={v}>{v}</option>;})}</select></div>
      <div className="fg"><label className="fl">Assigned To</label><input className="fi" value={f.AssignedTo} onChange={function(e){s("AssignedTo",e.target.value);}}/></div>

function Overview({user,items,loading}){
  var first=(user?.name||user?.username||"there").split(" ")[0];
  var open=items.filter(function(i){return !["Closed","Approved"].includes(i.Status);});

      </div>}

          {projects.map(function(p){var pi=items.filter(function(i){return i.Project===p;});var po=pi.filter(isOverdue);return <div key={p} style={{padding:12,background:"rgba(10,22,40,0.5)",border:"1px solid "+(po.length>0?"rgba(224,82,82,0.3)":"var(--border)"),borderRadius:8}}><div style={{fontWeight:700,fontSize:14,marginBottom:4}}>{p}</div><div style={{fontSize:12,color:"#8a9baa"}}>{pi.length} items · {pi.filter(function(i){return !["Closed","Approved"].includes(i.Status);}).length} open{po.length>0&&<span style={{color:"var(--red)",marginLeft:4}}>· {po.length} overdue</span>}</div></div>;})}

/* ─── Notification System ─── */
function generateNotifications(items){
  var notifs=[];var now=new Date();
  items.forEach(function(i){
    if(["Closed","Approved"].includes(i.Status))return;
    var due=i.DueDate?new Date(i.DueDate):null;
    if(due){var days=Math.floor((now-due)/86400000);
      if(days>14)notifs.push({id:"od-"+i.id,type:"critical",icon:"🔴",title:i.Title||i.Number,msg:"Overdue by "+days+"d — "+i.Project,time:days+"d overdue",item:i});
      else if(days>0)notifs.push({id:"od-"+i.id,type:"warning",icon:"🟡",title:i.Title||i.Number,msg:"Overdue by "+days+"d",time:days+"d",item:i});
      else if(days>=-3)notifs.push({id:"due-"+i.id,type:"info",icon:"🔵",title:i.Title||i.Number,msg:"Due in "+Math.abs(days)+"d — "+i.Project,time:"Due soon",item:i});
    }
  });
  return notifs.sort(function(a,b){return a.type==="critical"?-1:b.type==="critical"?1:0;});
}

        <div style={{flex:1}}><div style={{fontWeight:600,fontSize:13,color:"#375673"}}>{n.title}</div><div style={{fontSize:12,color:"#8a9baa",marginTop:2}}>{n.msg}</div></div>

    {viewMode==="kanban"&&<div className="kanban">{STS.map(function(st){var col=kanbanCols[st]||[];if(col.length===0&&!["Draft","Submitted","In Review","Approved"].includes(st))return null;return <div key={st} className="kanban-col"><div className="kanban-col-title" style={{borderColor:colColors[st]||"#c4d0dc"}}>{st}<span style={{fontSize:11,fontWeight:400,color:"#8a9baa"}}>{col.length}</span></div>{col.map(function(item){return <div key={item.id} className="kanban-card" onClick={function(){setSel(item);if(isAdmin)setModal("edit");}}><div className="kanban-card-title">{item.Title||item.Number||"—"}</div><div className="kanban-card-sub">{item.Project||"—"} · <BIC val={item.BallInCourt}/></div>{isOverdue(item)&&<div style={{fontSize:10,color:"var(--red)",fontWeight:600,marginTop:4}}>⚠ {agingDays(item.DueDate)}d overdue</div>}</div>;})}{col.length===0&&<div style={{textAlign:"center",padding:20,color:"#c4d0dc",fontSize:12}}>Empty</div>}</div>;})}</div>}

    {modal==="add"&&<AddModal projects={projects} onClose={function(){setModal(null);}} onSave={async function(f){await onAdd(f);flash("Added ✓");}}/>}
    {modal==="edit"&&sel&&<EditModal item={sel} projects={projects} onClose={function(){setModal(null);}} onSave={async function(id,f){await onEdit(id,f);flash("Updated ✓");}}/>}
    {modal==="bulk"&&<BulkEditModal count={selected.size} onClose={function(){setModal(null);}} onApply={async function(f,v){await handleBulk(f,v);setModal(null);}}/>}
    {modal==="template"&&<TemplateModal onClose={function(){setModal(null);}} onSave={async function(f){await onAdd(f);flash("Template items created ✓");}}/>}
  </div>);
}

function ExecRollup(){

  const[stateFilter,setStateFilter]=useState("all");

  var cats=useMemo(function(){var m={};EXEC_DATA.forEach(function(p){var c=catLabel(p.Category);m[c]=(m[c]||0)+1;});return Object.entries(m).sort(function(a,b){return b[1]-a[1];});},[]);
  var states=useMemo(function(){var m={};EXEC_DATA.forEach(function(p){if(p.State){var s=p.State.trim();m[s]=(m[s]||0)+1;}});return Object.entries(m).sort(function(a,b){return b[1]-a[1];});},[]);

  var filtered=useMemo(function(){return EXEC_DATA.filter(function(p){
    var matchSearch=!search||(p.re||"").toLowerCase().includes(search.toLowerCase())||(p.CLIENT||"").toLowerCase().includes(search.toLowerCase())||(p["CITY, STATE"]||"").toLowerCase().includes(search.toLowerCase());
    var matchCat=catFilter==="all"||catLabel(p.Category)===catFilter;
    var matchState=stateFilter==="all"||(p.State||"").trim()===stateFilter;
    return matchSearch&&matchCat&&matchState;
  });},[search,catFilter,stateFilter]);

  var totalRev=EXEC_DATA.reduce(function(s,p){return s+(p["BID (Revenue)"]||0);},0);
  var activeRev=EXEC_DATA.filter(function(p){var c=(p.Category||"").trim().toLowerCase();return c==="under construction"||c.includes("lntp");}).reduce(function(s,p){return s+(p["BID (Revenue)"]||0);},0);
  var totalMW=EXEC_DATA.reduce(function(s,p){return s+(p["DC SIZE (MW)"]||0);},0);
  var activeCnt=EXEC_DATA.filter(function(p){var c=(p.Category||"").trim().toLowerCase();return c==="under construction";}).length;
  var lntpCnt=EXEC_DATA.filter(function(p){return(p.Category||"").toUpperCase().includes("LNTP");}).length;

      <div style={{display:"flex",gap:8,alignItems:"center"}}><span style={{fontSize:10,color:"#8a9baa",textTransform:"uppercase",letterSpacing:1}}>Source: Excel</span></div>

    <div className="exec-kpis">
      <div className="kpi-card good"><div className="kpi-label">Total Projects</div><div className="kpi-value">{EXEC_DATA.length}</div><div className="kpi-sub green">Portfolio</div></div>
      <div className="kpi-card" style={{borderColor:"rgba(46,204,138,0.3)"}}><div className="kpi-label">Active Construction</div><div className="kpi-value">{activeCnt}</div><div className="kpi-sub green">Under construction</div></div>
      <div className="kpi-card"><div className="kpi-label">LNTP</div><div className="kpi-value">{lntpCnt}</div><div className="kpi-sub">Limited notice</div></div>
      <div className="kpi-card"><div className="kpi-label">Pipeline</div><div className="kpi-value">{pipeCnt}</div><div className="kpi-sub">Pre-NTP</div></div>
      <div className="kpi-card"><div className="kpi-label">Total Revenue</div><div className="kpi-value">{fmtMoney(totalRev)}</div><div className="kpi-sub">All projects</div></div>
      <div className="kpi-card"><div className="kpi-label">Active Revenue</div><div className="kpi-value">{fmtMoney(activeRev)}</div><div className="kpi-sub green">Construction + LNTP</div></div>
      <div className="kpi-card"><div className="kpi-label">Total DC MW</div><div className="kpi-value">{totalMW.toFixed(1)}</div><div className="kpi-sub">Portfolio capacity</div></div>

        {cats.map(function(e){return <div key={e[0]} className={"ptab "+(catFilter===e[0]?"active":"")} onClick={function(){setCatFilter(catFilter===e[0]?"all":e[0]);}}>{e[0]} <span className="tc">({e[1]})</span></div>;})}
      </div>

              <div className="exec-grid">
                <div className="exec-field"><div className="exec-field-label">Contact</div><div className="exec-field-value">{(p["Owner Contact"]||"").trim()||"—"}</div></div>
                <div className="exec-field"><div className="exec-field-label">Email</div><div className="exec-field-value">{p["Owner Email"]?<a href={"mailto:"+p["Owner Email"]} style={{color:"#779d36",fontSize:12}}>{p["Owner Email"]}</a>:"—"}</div></div>
                {p["Owner Phone"]&&<div className="exec-field"><div className="exec-field-label">Phone</div><div className="exec-field-value">{p["Owner Phone"]}</div></div>}
              </div>
            </div>}

            {(dc||rev)&&<div className="exec-section">
              <div className="exec-section-title">💰 Financials & Capacity</div>
              <div className="exec-grid">
                {dc&&<div className="exec-field"><div className="exec-field-label">DC Size (MW)</div><div className="exec-field-value" style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:700}}>{dc}</div></div>}
                {ac&&<div className="exec-field"><div className="exec-field-label">AC Size (MW)</div><div className="exec-field-value" style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:700}}>{ac}</div></div>}
                {rev&&<div className="exec-field"><div className="exec-field-label">Revenue (Bid)</div><div className="exec-field-value" style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:700,color:"#779d36"}}>{fmtMoney(rev)}</div></div>}
                {p["BID/WATT"]>0&&<div className="exec-field"><div className="exec-field-label">Bid/Watt</div><div className="exec-field-value">${p["BID/WATT"].toFixed(3)}</div></div>}
                {p["# OF MODULES"]&&<div className="exec-field"><div className="exec-field-label">Modules</div><div className="exec-field-value">{(p["# OF MODULES"]).toLocaleString()}</div></div>}
                {p["MODULE TYPE"]&&<div className="exec-field"><div className="exec-field-label">Module Type</div><div className="exec-field-value">{p["MODULE TYPE"]}</div></div>}
              </div>
            </div>}

            <div className="exec-section">
              <div className="exec-section-title">📅 Milestones</div>
              <div className="exec-grid">
                {milestoneFields.map(function(f){var v=p[f];if(!v)return null;return <div key={f} className="exec-field"><div className="exec-field-label">{f}</div><div className="exec-field-value">{typeof v==="string"&&v.match(/^\d{4}-\d{2}/)?fmtDate(v):v}</div></div>;})}
              </div>
            </div>

            {permitFields.some(function(f){return p[f];})&&<div className="exec-section">
              <div className="exec-section-title">🏛 Permits</div>
              <div className="permit-grid">
                {permitFields.map(function(f){var v=p[f];if(!v)return null;var isDone=(v||"").toLowerCase().includes("complete")||(v||"").toLowerCase().includes("received")||(v||"").toLowerCase().includes("approved")||(v||"").toLowerCase().includes("done");var isNeed=(v||"").toLowerCase().includes("need");var cls=isDone?"permit-done":isNeed?"permit-need":"permit-prog";return <div key={f} className={"permit-item "+cls}><span className="permit-label">{f.replace(" permit","").replace(" Permit","")}</span><span className="permit-val">{v}</span></div>;})}
              </div>
            </div>}

            {p["Critical Path"]&&<div className="exec-section">
              <div className="exec-section-title">🔴 Critical Path</div>
              <div className="exec-critical">{p["Critical Path"]}</div>
            </div>}

            {p.Billings&&<div className="exec-section">
              <div className="exec-section-title">💵 Billing Status</div>
              <div className="exec-billing">{p.Billings}</div>
            </div>}

            {p.Comments&&<div className="exec-section">
              <div className="exec-section-title">💬 Latest Notes</div>
              <div className="exec-comments">{p.Comments}</div>
            </div>}
          </div>}
        </div>;
      })}
    </div>
    {filtered.length===0&&<div style={{textAlign:"center",padding:60,color:"#8a9baa"}}><div style={{fontSize:32,marginBottom:8,opacity:0.5}}>🔍</div>No projects match your filters.</div>}
  </div>);
}

function Login({onLogin}){
  const[loading,setLoading]=useState(false);const[error,setError]=useState(null);
  var login=async function(){setLoading(true);setError(null);try{await msalInstance.initialize();var r=await msalInstance.loginPopup({scopes:SCOPES});onLogin(r.account);}catch(e){setError(e.message);setLoading(false);}};
  return(<div className="login-screen"><div className="login-card">
    <div><img src="logo.png" alt="Distributed Energy Infrastructure" style={{width:"80%",maxWidth:280,marginBottom:8}}/><div className="login-tagline">Building a Connected Future</div></div>
    <div className="login-divider"/>
    <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:700,marginBottom:8}}>Project Truth</div>
    <div style={{fontSize:13,color:"#8a9baa",marginBottom:28,lineHeight:1.5}}>Sign in with your DEI Microsoft account to access the PMO control plane.</div>
    {error&&<div className="be" style={{marginBottom:16,textAlign:"left"}}>⚠ {error}</div>}
    <button className="ms-btn" onClick={login} disabled={loading}>
      <svg width="20" height="20" viewBox="0 0 21 21"><rect x="1" y="1" width="9" height="9" fill="#F25022"/><rect x="11" y="1" width="9" height="9" fill="#7FBA00"/><rect x="1" y="11" width="9" height="9" fill="#00A4EF"/><rect x="11" y="11" width="9" height="9" fill="#FFB900"/></svg>
      {loading?"Signing in...":"Sign in with Microsoft"}
    </button>
    <div style={{marginTop:24,fontSize:11,color:"#8a9baa"}}>Restricted to DEI accounts only</div>
  </div></div>);
}

function App(){
  const[user,setUser]=useState(null);const[view,setView]=useState("overview");const[ready,setReady]=useState(false);const[role,setRole]=useState("admin");const[showNotifs,setShowNotifs]=useState(false);
  const[items,setItems]=useState([]);const[loading,setLoading]=useState(true);const[error,setError]=useState(null);
  useEffect(function(){msalInstance.initialize().then(function(){var a=msalInstance.getAllAccounts();if(a.length)setUser(a[0]);setReady(true);});},[]);
  var dd=useDropdowns();
  var load=useCallback(async function(){setLoading(true);setError(null);try{setItems(await getItems(CONFIG.lists.rfi));}catch(e){setError(e.message);}finally{setLoading(false);}},[]);
  useEffect(function(){if(user)load();},[user,load]);
  var handleAdd=async function(f){await addItem(CONFIG.lists.rfi,f);load();};
  var handleEdit=async function(id,f){await editItem(CONFIG.lists.rfi,id,f);load();};
  if(!ready)return <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh"}}><div className="spinner"/></div>;
  if(!user)return <Login onLogin={setUser}/>;
  var overdue=items.filter(isOverdue);
  var notifications=generateNotifications(items);
  var nav=[{section:"PROJECT"},{id:"overview",icon:"🏠",label:"Overview"},{id:"executive",icon:"📊",label:"Executive Roll-up"},{section:"LOGS"},{id:"engineering",icon:"⚙",label:"Engineering Log",badge:overdue.length},{id:"owner",icon:"👤",label:"Owner Log"},{id:"permits",icon:"🏛",label:"Permits"},{id:"closeout",icon:"📋",label:"Closeout"},{section:"ADMIN"},{id:"dropdowns",icon:"📑",label:"Common Dropdowns"},{id:"requirements",icon:"✅",label:"Requirements"}];
  var titles={overview:"Overview",executive:"Executive Roll-up",engineering:"Engineering Log",owner:"Owner Log",permits:"Permit Matrix",closeout:"Closeout",dropdowns:"Common Dropdowns",requirements:"Requirements Tracker"};
  return(<div className="app">
    <div className="sidebar"><div className="sidebar-logo"><img src="logo.png" alt="DEI" style={{width:"100%",maxWidth:200}}/><div className="logo-tagline">Project Truth — PMO</div><div className="logo-divider"/></div>
      <div className="nav">{nav.map(function(item,i){if(item.section)return <div key={i} className="nav-section">{item.section}</div>;return <div key={item.id} className={"nav-item "+(view===item.id?"active":"")} onClick={function(){setView(item.id);}}><span className="nav-icon">{item.icon}</span><span>{item.label}</span>{item.badge>0&&<span className="nav-badge">{item.badge}</span>}</div>;})}</div>
      <div className="role-switch" onClick={function(){setRole(role==="admin"?"viewer":"admin");}}><span className={"role-indicator "+(role==="admin"?"role-admin":"role-viewer")}>{role}</span><span>Click to toggle</span></div>
      <div className="sidebar-user"><div className="user-name">{user.name||"User"}</div><div className="user-org">{user.username}</div><button className="signout-btn" onClick={function(){msalInstance.logoutPopup();setUser(null);}}>Sign out</button></div>
    </div>
    <div className="main">
      <div className="topbar"><div className="topbar-title">{titles[view]}</div><div style={{display:"flex",alignItems:"center",gap:16}}><div style={{position:"relative",cursor:"pointer"}} onClick={function(){setShowNotifs(!showNotifs);}}><span style={{fontSize:18}}>🔔</span>{notifications.length>0&&<span className="notif-dot"/>}</div><div className="live-dot">SharePoint Connected</div></div></div>
      <div className="content">
        {view==="overview"&&<Overview user={user} items={items} loading={loading}/>}
        {view==="executive"&&<ExecRollup/>}
        {view==="engineering"&&<Engineering items={items} loading={loading} error={error} onReload={load} onAdd={handleAdd} onEdit={handleEdit} role={role}/>}
        {view==="owner"&&<ComingSoon title="Owner Log" listName="DEI-BOM-Procurement"/>}
        {view==="permits"&&<ComingSoon title="Permit Matrix" listName="DEI-Permit-Matrix"/>}
        {view==="closeout"&&<ComingSoon title="Closeout Tracker" listName="DEI-Closeout-Items"/>}
        {view==="dropdowns"&&<DropdownManager dropdowns={dd.dropdowns} addOption={dd.addOption} removeOption={dd.removeOption} addCategory={dd.addCategory}/>}
        {view==="requirements"&&<ReqTracker/>}
        {showNotifs&&<NotifPanel notifications={notifications} onClose={function(){setShowNotifs(false);}} onNavigate={function(item){setShowNotifs(false);setView("engineering");}}/>}
      </div>
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
